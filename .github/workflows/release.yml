name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x' # Kept at 1.25 because go.mod pins go 1.25.1

      - name: Build Binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w -X 'main.Version=${{ github.ref_name }}'" -o purr ./cmd/purr

      - name: Create Archive
        run: |
          tar -czvf persephone_${{ matrix.os }}_${{ matrix.arch }}.tar.gz purr

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: persephone_${{ matrix.os }}_${{ matrix.arch }}
          path: "*.tar.gz"

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
