name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - run: go vet ./...
      - run: go test -race ./...

  tag:
    needs: verify
    name: Auto-tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build:
    name: Build
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x' # Kept at 1.25 because go.mod pins go 1.25.1

      - name: Build Binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w -X 'main.Version=${{ needs.tag.outputs.new_tag }}'" -o purr ./cmd/purr

      - name: Create Archive
        run: |
          tar -czvf persephone_${{ matrix.os }}_${{ matrix.arch }}.tar.gz purr

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: persephone_${{ matrix.os }}_${{ matrix.arch }}
          path: "*.tar.gz"

  publish:
    name: Publish Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: dist/*.tar.gz
          generate_release_notes: true
